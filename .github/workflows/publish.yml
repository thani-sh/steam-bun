name: Publish

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write # OIDC Publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build
      - name: Publish
        run: bun .scripts/publish.ts
